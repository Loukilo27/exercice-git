name: Validation Totale PR
on:
  pull_request:
    branches: [ main, master ]

jobs:
  verification:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          coverage: xdebug # Pour le rapport de couverture

      - name: Installer Dépendances
        run: composer install

      - name: Vérifier Arborescence & Extensions
        run: php .github/scripts/check_tree.php

      - name: Lancer les Tests & Rapport de Couverture
        run: ./vendor/bin/phpunit --coverage-text