name: Liste des fichiers au Push

# Déclencheur : s'exécute à chaque push sur n'importe quelle branche
on: [push]

jobs:
  check-files:
    runs-on: ubuntu-latest # On utilise un serveur Linux
    steps:
      - name: Récupérer le code du dépôt
        uses: actions/checkout@v4 # Étape obligatoire pour que l'action voit tes fichiers

      - name: Afficher la liste des fichiers
        run: ls -R # Le -R permet de voir aussi le contenu des sous-dossiers (comme src/)